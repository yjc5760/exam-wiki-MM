<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>RC 梁斷面分析 — 降伏與極限狀態</title>
<style>
  /* ── 色彩系統 ── */
  :root {
    --bg:        #f0f2f5;
    --surface:   #ffffff;
    --border:    #dde1e7;
    --text:      #1c2333;
    --muted:     #6b7585;
    --yield:     #4338ca;   /* indigo */
    --yield-lt:  #eef2ff;
    --ult:       #b91c1c;   /* red */
    --ult-lt:    #fff1f1;
    --ok:        #059669;   /* green */
    --warning:   #d97706;
    --code-bg:   #171e2e;
    --code-line: #e2e8f0;
    --code-dim:  #7f8fa8;
    --code-hi-y: #818cf8;
    --code-hi-u: #f87171;
    --code-val:  #6ee7b7;
    --code-mu:   #fbbf24;
    font-family: "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", system-ui, sans-serif;
  }

  /* ── Reset ── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); min-height: 100vh; padding: 24px 16px; }

  /* ── Layout ── */
  .app { max-width: 1120px; margin: 0 auto; display: flex; flex-direction: column; gap: 20px; }

  /* ── Header ── */
  .header {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; padding: 20px 28px;
    display: flex; align-items: center; gap: 16px;
  }
  .header-icon {
    width: 52px; height: 52px; background: #eef2ff; border-radius: 12px;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .header-icon svg { width: 26px; height: 26px; stroke: var(--yield); fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .header h1 { font-size: 1.35rem; font-weight: 800; color: var(--text); }
  .header p  { font-size: 0.85rem; color: var(--muted); margin-top: 2px; }

  /* ── Grid ── */
  .grid { display: grid; grid-template-columns: 340px 1fr; gap: 20px; }
  @media (max-width: 900px) { .grid { grid-template-columns: 1fr; } }

  /* ── Panels ── */
  .panel {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; padding: 22px;
  }
  .panel-title {
    display: flex; align-items: center; gap: 8px;
    font-size: 0.95rem; font-weight: 700; color: var(--text);
    margin-bottom: 20px; padding-bottom: 12px; border-bottom: 1px solid var(--border);
  }
  .panel-title svg { width: 17px; height: 17px; stroke: var(--muted); fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

  /* ── Sliders ── */
  .slider-group { display: flex; flex-direction: column; gap: 14px; }
  .slider-item label { display: flex; justify-content: space-between; font-size: 0.82rem; font-weight: 600; color: var(--muted); margin-bottom: 5px; }
  .slider-item label span { color: var(--yield); font-weight: 700; }
  input[type=range] {
    width: 100%; appearance: none; height: 5px; border-radius: 4px;
    background: var(--border); cursor: pointer; outline: none;
  }
  input[type=range]::-webkit-slider-thumb {
    appearance: none; width: 16px; height: 16px; border-radius: 50%;
    background: var(--yield); border: 2px solid white;
    box-shadow: 0 1px 4px rgba(67,56,202,.4); cursor: pointer;
    transition: transform .12s;
  }
  input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.2); }

  /* ── Notes ── */
  .notes {
    background: var(--yield-lt); border: 1px solid #c7d2fe;
    border-radius: 14px; padding: 18px;
    display: flex; gap: 10px; margin-top: 18px;
  }
  .notes svg { width: 17px; height: 17px; stroke: var(--yield); fill: none; stroke-width: 2; flex-shrink: 0; margin-top: 2px; stroke-linecap: round; stroke-linejoin: round; }
  .notes h4 { font-size: 0.85rem; font-weight: 700; color: #312e81; margin-bottom: 8px; }
  .notes ul { list-style: none; display: flex; flex-direction: column; gap: 6px; }
  .notes li { font-size: 0.79rem; color: #3730a3; line-height: 1.5; }
  .notes li::before { content: "▸ "; opacity: .7; }

  /* ── Tabs ── */
  .tabs {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; padding: 5px; display: flex; gap: 5px;
  }
  .tab {
    flex: 1; padding: 10px 16px; border: none; border-radius: 10px;
    font-size: 0.88rem; font-weight: 600; cursor: pointer;
    transition: all .2s; background: transparent; color: var(--muted);
  }
  .tab:hover:not(.active) { background: var(--bg); color: var(--text); }
  .tab.active-yield  { background: var(--yield); color: #fff; box-shadow: 0 2px 8px rgba(67,56,202,.35); }
  .tab.active-ult    { background: var(--ult);   color: #fff; box-shadow: 0 2px 8px rgba(185,28,28,.35); }

  /* ── Diagram panel ── */
  .diagram-panel {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; padding: 22px;
  }
  .diagram-title { font-size: 0.95rem; font-weight: 700; margin-bottom: 16px; }
  .diagram-area {
    display: flex; align-items: center; justify-content: center;
    gap: 32px; flex-wrap: wrap; min-height: 300px; padding: 8px 0;
  }
  .diagram-col { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .diagram-col-label { font-size: 0.74rem; font-weight: 600; color: var(--muted); letter-spacing: .03em; }

  /* ── Code box ── */
  .code-box {
    background: var(--code-bg); border-radius: 14px; padding: 22px;
    font-family: "Fira Code", "JetBrains Mono", "Cascadia Code", "Noto Sans Mono TC", monospace;
    font-size: 0.8rem; line-height: 1.75; color: var(--code-line); overflow-x: auto;
  }
  .code-box-header {
    display: flex; align-items: center; gap: 8px;
    font-size: 0.85rem; font-weight: 700; color: #94a3b8;
    border-bottom: 1px solid #2d3748; padding-bottom: 10px; margin-bottom: 16px;
  }
  .code-box-header svg { width: 16px; height: 16px; stroke: #94a3b8; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .code-sec   { color: var(--code-hi-y); font-weight: 700; }
  .code-sec-u { color: var(--code-hi-u); font-weight: 700; }
  .code-val   { color: var(--code-val); font-weight: 700; }
  .code-dim   { color: var(--code-dim); }
  .mu-box {
    display: flex; align-items: center; justify-content: space-between;
    background: #1e293b; border: 1px solid #334155; border-radius: 8px;
    padding: 10px 16px; margin-top: 12px;
  }
  .mu-val { color: var(--code-mu); font-size: 1.1rem; font-weight: 800; }

  /* ── Result summary strip ── */
  .result-strip {
    display: flex; gap: 12px; flex-wrap: wrap;
  }
  .result-chip {
    flex: 1; min-width: 120px; background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 14px 16px; text-align: center;
  }
  .result-chip .chip-label { font-size: 0.73rem; color: var(--muted); font-weight: 600; margin-bottom: 4px; }
  .result-chip .chip-val   { font-size: 1.05rem; font-weight: 800; }
  .chip-yield { color: var(--yield); }
  .chip-ult   { color: var(--ult); }
  .chip-ok    { color: var(--ok); }

  /* ── Right col stack ── */
  .right-col { display: flex; flex-direction: column; gap: 18px; }
</style>
</head>
<body>
<div class="app">

  <!-- Header -->
  <header class="header">
    <div class="header-icon">
      <svg viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/><path d="M6 7h4M6 11h8M6 15h3"/></svg>
    </div>
    <div>
      <h1>RC 梁斷面分析學習工具</h1>
      <p>鋼筋混凝土梁 — 降伏狀態 × 極限狀態 互動視覺化</p>
    </div>
  </header>

  <!-- Main grid -->
  <div class="grid">

    <!-- Left: controls -->
    <div>
      <div class="panel">
        <div class="panel-title">
          <svg viewBox="0 0 24 24"><path d="M4 6h16M4 12h8M4 18h12"/><circle cx="18" cy="12" r="3"/><circle cx="10" cy="6" r="3"/><circle cx="14" cy="18" r="3"/></svg>
          斷面參數設定
        </div>
        <div class="slider-group" id="sliders"></div>
      </div>

      <div class="notes">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <div>
          <h4>學習重點筆記</h4>
          <ul>
            <li><strong>降伏時</strong>：受壓區呈線性彈性，可用「轉換斷面法」面積一次矩平衡求中性軸。</li>
            <li><strong>極限時</strong>：混凝土達 εcu = 0.003，應力區等效為 Whitney 矩形 (0.85f'c)。</li>
            <li><strong>延展性設計</strong>：鋼筋先降伏、混凝土後壓碎，μ = Φu/Φy 越大越好。</li>
          </ul>
        </div>
      </div>
    </div>

    <!-- Right -->
    <div class="right-col">

      <!-- Tabs -->
      <div class="tabs">
        <button class="tab active-yield" id="tab-yield" onclick="switchTab('yield')">降伏狀態（Yield State）</button>
        <button class="tab" id="tab-ult"   onclick="switchTab('ultimate')">極限狀態（Ultimate State）</button>
      </div>

      <!-- Result chips -->
      <div class="result-strip" id="result-strip"></div>

      <!-- Diagram -->
      <div class="diagram-panel">
        <div class="diagram-title" id="diagram-title">降伏應力與應變圖</div>
        <div class="diagram-area" id="diagram-area"></div>
      </div>

      <!-- Code box -->
      <div class="code-box">
        <div class="code-box-header">
          <svg viewBox="0 0 24 24"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
          計算解析與公式推導
        </div>
        <div id="code-content"></div>
      </div>

    </div>
  </div>
</div>

<script>
/* ─── 狀態 ─── */
const params = {
  b:  { label: "梁寬 (b)",          unit: "cm",       min: 20,   max: 60,   step: 1,   val: 30  },
  d:  { label: "有效深度 (d)",       unit: "cm",       min: 30,   max: 100,  step: 1,   val: 50  },
  As: { label: "鋼筋面積 (As)",      unit: "cm²",      min: 5,    max: 50,   step: 1,   val: 15  },
  fc: { label: "混凝土強度 (f'c)",   unit: "kgf/cm²",  min: 210,  max: 420,  step: 10,  val: 280 },
  fy: { label: "鋼筋降伏強度 (fy)",  unit: "kgf/cm²",  min: 2800, max: 4200, step: 100, val: 4200},
  n:  { label: "彈性模數比 (n)",     unit: "",         min: 6,    max: 10,   step: 0.5, val: 8   },
};
const Es = 2040000;
let activeTab = 'yield';

/* ─── 建立滑桿 ─── */
const sliderEl = {};
const sliderContainer = document.getElementById('sliders');
Object.entries(params).forEach(([key, p]) => {
  const wrap = document.createElement('div');
  wrap.className = 'slider-item';
  wrap.innerHTML = `
    <label>${p.label}<span id="val-${key}">${p.val} ${p.unit}</span></label>
    <input type="range" min="${p.min}" max="${p.max}" step="${p.step}" value="${p.val}" id="sl-${key}">
  `;
  sliderContainer.appendChild(wrap);
  const input = wrap.querySelector('input');
  sliderEl[key] = input;
  input.addEventListener('input', () => {
    params[key].val = Number(input.value);
    document.getElementById(`val-${key}`).textContent = `${params[key].val} ${p.unit}`;
    render();
  });
});

/* ─── 計算 ─── */
function calculate() {
  const { b, d, As, fc, fy, n } = Object.fromEntries(
    Object.entries(params).map(([k, p]) => [k, p.val])
  );

  // 降伏（轉換斷面法）
  const A_eq = b / 2, B_eq = n.val !== undefined ? n : params.n.val;
  const nv = params.n.val;
  const Av = b / 2;
  const Bv = nv * As;
  const Cv = -nv * As * d;
  const x_y = (-Bv + Math.sqrt(Bv*Bv - 4*Av*Cv)) / (2*Av);
  const eps_y = fy / Es;
  const phi_y = eps_y / (d - x_y);
  const eps_c_y = eps_y * (x_y / (d - x_y));

  // 極限（Whitney）
  const a    = (As * fy) / (0.85 * fc * b);
  const beta1 = fc <= 280 ? 0.85 : Math.max(0.65, 0.85 - 0.05 * ((fc - 280) / 70));
  const x_u  = a / beta1;
  const eps_cu = 0.003;
  const phi_u = eps_cu / x_u;

  // 延展比
  const mu = phi_u / phi_y;

  return { b, d, As, fc, fy, nv, x_y, eps_y, phi_y, eps_c_y, a, beta1, x_u, eps_cu, phi_u, mu };
}

/* ─── 主繪製 ─── */
function render() {
  const R = calculate();
  renderChips(R);
  renderDiagram(R);
  renderCode(R);
}

/* ─── Result chips ─── */
function renderChips(R) {
  const isY = activeTab === 'yield';
  const chips = isY
    ? [
        { label: "中性軸 x",  val: R.x_y.toFixed(2) + " cm",  cls: "chip-yield" },
        { label: "降伏曲率 Φy", val: (R.phi_y*1000).toFixed(4) + " ×10⁻³",  cls: "chip-yield" },
        { label: "εy",  val: R.eps_y.toFixed(5), cls: "chip-yield" },
        { label: "εc(降伏)",  val: R.eps_c_y.toFixed(5), cls: "chip-yield" },
      ]
    : [
        { label: "應力塊深度 a", val: R.a.toFixed(2) + " cm",  cls: "chip-ult" },
        { label: "極限中性軸 x", val: R.x_u.toFixed(2) + " cm", cls: "chip-ult" },
        { label: "極限曲率 Φu", val: (R.phi_u*1000).toFixed(4) + " ×10⁻³", cls: "chip-ult" },
        { label: "延展比 μ",    val: R.mu.toFixed(2), cls: "chip-ok" },
      ];
  document.getElementById('result-strip').innerHTML = chips.map(c => `
    <div class="result-chip">
      <div class="chip-label">${c.label}</div>
      <div class="chip-val ${c.cls}">${c.val}</div>
    </div>
  `).join('');
}

/* ─── SVG diagram ─── */
function renderDiagram(R) {
  document.getElementById('diagram-title').textContent =
    activeTab === 'yield' ? '降伏應力與應變圖' : '極限應力與應變圖';

  const isY  = activeTab === 'yield';
  const { b, d, As, fc, fy, nv, x_y, x_u, a, phi_y, phi_u, eps_y, eps_cu } = R;

  const H_ref = 220;          // SVG 有效深度對應像素
  const sc = H_ref / d;       // cm → px
  const bPx = Math.min(b * sc * 1.4, 90);  // 梁寬顯示寬度
  const x = isY ? x_y : x_u;
  const xPx = x * sc;
  const dPx = d * sc;
  const aPx = a * sc;

  const TOP = 30; // SVG 上邊界

  /* ── 斷面 SVG ── */
  const W_sec = bPx + 40;
  const H_svg = dPx + TOP + 40;
  const bx = 20, by = TOP;

  // 壓力區高度
  const compH = isY ? xPx : aPx;

  const section = `
  <svg width="${W_sec}" height="${H_svg}" style="overflow:visible">
    <defs>
      <pattern id="hatch" patternUnits="userSpaceOnUse" width="8" height="8">
        <path d="M-2,2 l4,-4 M0,8 l8,-8 M6,10 l4,-4" stroke="#94a3b8" stroke-width="1"/>
      </pattern>
      <marker id="ar" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
        <path d="M0 0 L10 5 L0 10z" fill="#6b7585"/>
      </marker>
    </defs>
    <!-- 混凝土矩形 -->
    <rect x="${bx}" y="${by}" width="${bPx}" height="${dPx+6}" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.5" rx="2"/>
    <!-- 壓力區斜線 -->
    <rect x="${bx}" y="${by}" width="${bPx}" height="${compH}" fill="url(#hatch)" rx="2"/>
    <!-- 中性軸 -->
    <line x1="${bx-10}" y1="${by+xPx}" x2="${bx+bPx+10}" y2="${by+xPx}" stroke="#94a3b8" stroke-dasharray="5,4" stroke-width="1.5"/>
    <text x="${bx+bPx+12}" y="${by+xPx+4}" font-size="10" fill="#6b7585" font-weight="700">N.A.</text>
    <!-- 鋼筋 -->
    <rect x="${bx+bPx/2-15}" y="${by+dPx-4}" width="30" height="8" fill="#ef4444" rx="2"/>
    <text x="${bx+bPx/2}" y="${by+dPx-10}" font-size="10" fill="#ef4444" text-anchor="middle">${isY ? 'nAs' : 'As'}</text>
    <!-- d 標註 -->
    <line x1="${bx-10}" y1="${by}" x2="${bx-10}" y2="${by+dPx}" stroke="#6b7585" marker-start="url(#ar)" marker-end="url(#ar)" stroke-width="1"/>
    <text x="${bx-22}" y="${by+dPx/2+4}" font-size="10" fill="#6b7585" text-anchor="middle" transform="rotate(-90,${bx-22},${by+dPx/2+4})">d=${d}</text>
    <!-- b 標註 -->
    <line x1="${bx}" y1="${by+dPx+22}" x2="${bx+bPx}" y2="${by+dPx+22}" stroke="#6b7585" marker-start="url(#ar)" marker-end="url(#ar)" stroke-width="1"/>
    <text x="${bx+bPx/2}" y="${by+dPx+34}" font-size="10" fill="#6b7585" text-anchor="middle">b=${b}</text>
    <!-- x 標註 -->
    <line x1="${bx-22}" y1="${by}" x2="${bx-22}" y2="${by+xPx}" stroke="#6b7585" marker-start="url(#ar)" marker-end="url(#ar)" stroke-width="1"/>
    <text x="${bx-34}" y="${by+xPx/2+4}" font-size="9" fill="#6b7585" text-anchor="middle">x</text>
  </svg>`;

  /* ── 應變 SVG ── */
  const W_str = 110;
  const cx = W_str / 2;  // 基準線 x
  // 壓力應變寬度（右）
  const topW = isY ? 36 * (x_y/(d-x_y)) : 36;
  // 拉力應變寬度（左）
  const botW = isY ? 36 : 36 * ((d-x_u)/x_u);

  const strain = `
  <svg width="${W_str}" height="${H_svg}" style="overflow:visible">
    <defs>
      <marker id="ar-b" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
        <path d="M0 0 L10 5 L0 10z" fill="#4338ca"/>
      </marker>
      <marker id="ar-g" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
        <path d="M0 0 L10 5 L0 10z" fill="#6b7585"/>
      </marker>
    </defs>
    <!-- 基準線 -->
    <line x1="${cx}" y1="${TOP}" x2="${cx}" y2="${TOP+dPx+10}" stroke="#dde1e7" stroke-width="1.5"/>
    <!-- 中性軸 -->
    <line x1="0" y1="${TOP+xPx}" x2="${W_str}" y2="${TOP+xPx}" stroke="#94a3b8" stroke-dasharray="5,4" stroke-width="1.5"/>
    <!-- 應變線 (壓力在右，拉力在左) -->
    <line x1="${cx}" y1="${TOP+xPx}" x2="${cx+topW}" y2="${TOP}" stroke="#4338ca" stroke-width="2"/>
    <line x1="${cx}" y1="${TOP+xPx}" x2="${cx-botW}" y2="${TOP+dPx}" stroke="#4338ca" stroke-width="2"/>
    <!-- 封頂封底水平線 -->
    <line x1="${cx}" y1="${TOP}" x2="${cx+topW}" y2="${TOP}" stroke="#4338ca" stroke-width="2"/>
    <line x1="${cx}" y1="${TOP+dPx}" x2="${cx-botW}" y2="${TOP+dPx}" stroke="#ef4444" stroke-width="2"/>
    <!-- 標籤 -->
    <text x="${cx+topW+4}" y="${TOP+6}" font-size="10" fill="#4338ca">${isY ? 'εc' : 'εcu=0.003'}</text>
    <text x="${cx-botW-4}" y="${TOP+dPx+4}" font-size="10" fill="#ef4444" text-anchor="end">${isY ? 'εy' : 'εs>εy'}</text>
    <text x="${cx+4}" y="${TOP+xPx+12}" font-size="10" fill="#4338ca">Φ${isY ? 'y' : 'u'}</text>
    <!-- x & d-x 標註 -->
    <line x1="${cx-12}" y1="${TOP}" x2="${cx-12}" y2="${TOP+xPx}" stroke="#6b7585" marker-start="url(#ar-g)" marker-end="url(#ar-g)" stroke-width="1"/>
    <text x="${cx-24}" y="${TOP+xPx/2+4}" font-size="9" fill="#6b7585" text-anchor="middle">x</text>
    <line x1="${cx-12}" y1="${TOP+xPx}" x2="${cx-12}" y2="${TOP+dPx}" stroke="#6b7585" marker-start="url(#ar-g)" marker-end="url(#ar-g)" stroke-width="1"/>
    <text x="${cx-26}" y="${TOP+xPx+(dPx-xPx)/2+4}" font-size="9" fill="#6b7585" text-anchor="middle">d-x</text>
  </svg>`;

  /* ── 應力 SVG ── */
  const W_st = 160;
  const sx = 55;  // 基準線 x（右移，讓標籤有空間）

  let stressContent = '';
  if (isY) {
    // 三角形壓力塊
    const tri_h = xPx;
    const tri_w = 36;
    stressContent = `
      <polygon points="${sx},${TOP} ${sx+tri_w},${TOP} ${sx},${TOP+tri_h}"
        fill="#eef2ff" stroke="#4338ca" stroke-width="1.8"/>
      <!-- C 合力箭頭 -->
      <line x1="${sx+tri_w+4}" y1="${TOP+tri_h/3}" x2="${sx+4}" y2="${TOP+tri_h/3}"
        stroke="#4338ca" stroke-width="2.5" marker-end="url(#ar-c)"/>
      <text x="${sx+tri_w+8}" y="${TOP+tri_h/3+4}" font-size="9.5" fill="#4338ca">C = ½σ·b·x</text>
      <!-- T 鋼筋 -->
      <line x1="${sx}" y1="${TOP+dPx}" x2="${sx+38}" y2="${TOP+dPx}"
        stroke="#ef4444" stroke-width="2.5" marker-end="url(#ar-t)"/>
      <text x="${sx+42}" y="${TOP+dPx+4}" font-size="9.5" fill="#ef4444">T=As·fy</text>
    `;
  } else {
    // Whitney 矩形壓力塊
    const rect_w = 38;
    stressContent = `
      <rect x="${sx}" y="${TOP}" width="${rect_w}" height="${aPx}"
        fill="${'#fee2e2'}" stroke="#b91c1c" stroke-width="1.8" rx="2"/>
      <!-- a 標註（左側） -->
      <line x1="${sx-12}" y1="${TOP}" x2="${sx-12}" y2="${TOP+aPx}"
        stroke="#b91c1c" marker-start="url(#ar-u)" marker-end="url(#ar-u)" stroke-width="1"/>
      <text x="${sx-22}" y="${TOP+aPx/2+4}" font-size="9" fill="#b91c1c" text-anchor="middle">a</text>
      <!-- C 合力箭頭 -->
      <line x1="${sx+rect_w+4}" y1="${TOP+aPx/2}" x2="${sx+4}" y2="${TOP+aPx/2}"
        stroke="#b91c1c" stroke-width="2.5" marker-end="url(#ar-c-u)"/>
      <text x="${sx+rect_w+8}" y="${TOP+aPx/2+4}" font-size="9.5" fill="#b91c1c">C=0.85f'c·a·b</text>
      <!-- T 鋼筋 -->
      <line x1="${sx}" y1="${TOP+dPx}" x2="${sx+38}" y2="${TOP+dPx}"
        stroke="#ef4444" stroke-width="2.5" marker-end="url(#ar-t)"/>
      <text x="${sx+42}" y="${TOP+dPx+4}" font-size="9.5" fill="#ef4444">T=As·fy</text>
    `;
  }

  const stress = `
  <svg width="${W_st}" height="${H_svg}" style="overflow:visible">
    <defs>
      <marker id="ar-c" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto">
        <path d="M0 0 L10 5 L0 10z" fill="#4338ca"/>
      </marker>
      <marker id="ar-c-u" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto">
        <path d="M0 0 L10 5 L0 10z" fill="#b91c1c"/>
      </marker>
      <marker id="ar-u" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
        <path d="M0 0 L10 5 L0 10z" fill="#b91c1c"/>
      </marker>
      <marker id="ar-t" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto">
        <path d="M0 0 L10 5 L0 10z" fill="#ef4444"/>
      </marker>
    </defs>
    <!-- 基準線 -->
    <line x1="${sx}" y1="${TOP}" x2="${sx}" y2="${TOP+dPx+10}" stroke="#dde1e7" stroke-width="1.5"/>
    <!-- 中性軸 -->
    <line x1="0" y1="${TOP+xPx}" x2="${W_st}" y2="${TOP+xPx}" stroke="#94a3b8" stroke-dasharray="5,4" stroke-width="1.5"/>
    ${stressContent}
  </svg>`;

  document.getElementById('diagram-area').innerHTML = `
    <div class="diagram-col">
      <div class="diagram-col-label">斷面 Cross Section</div>
      ${section}
    </div>
    <div class="diagram-col">
      <div class="diagram-col-label">應變 Strain</div>
      ${strain}
    </div>
    <div class="diagram-col">
      <div class="diagram-col-label">應力 Stress</div>
      ${stress}
    </div>
  `;
}

/* ─── Code content ─── */
function renderCode(R) {
  const isY = activeTab === 'yield';
  const { b, d, As, fc, fy, nv, x_y, eps_y, phi_y, eps_c_y, a, beta1, x_u, phi_u, mu } = R;

  let html = '';
  if (isY) {
    html = `
<p><span class="code-sec">// 1. 轉換斷面法求中性軸 (N.A.)</span></p>
<p class="code-dim">公式 : (b·x) × (x/2) = n·As × (d − x)</p>
<p class="code-dim">整理 : (b/2)·x² + n·As·x − n·As·d = 0</p>
<p>代入 : (${b}/2)·x² + ${nv}×${As}·x − ${nv}×${As}×${d} = 0</p>
<p>→ 中性軸深度 x = <span class="code-val">${x_y.toFixed(3)} cm</span></p>

<p>&nbsp;</p>
<p><span class="code-sec">// 2. 降伏曲率 (Φy)</span></p>
<p>鋼筋降伏應變 εy = fy / Es = ${fy} / ${Es.toLocaleString()}</p>
<p>             εy = <span class="code-val">${eps_y.toFixed(6)}</span></p>
<p>降伏時混凝土應變 εc = εy × (x/(d−x))</p>
<p>                εc = <span class="code-val">${eps_c_y.toFixed(6)}</span></p>
<p>曲率 Φy = εy / (d − x) = ${eps_y.toFixed(6)} / (${d} − ${x_y.toFixed(2)})</p>
<p>    Φy = <span class="code-val">${(phi_y*1000).toFixed(5)} × 10⁻³ rad/cm</span></p>
    `;
  } else {
    html = `
<p><span class="code-sec-u">// 1. 力平衡 C = T 求應力塊深度 (a)</span></p>
<p class="code-dim">公式 : 0.85·f'c·a·b = As·fy</p>
<p>代入 : 0.85 × ${fc} × a × ${b} = ${As} × ${fy}</p>
<p>→ 應力塊深度 a = <span class="code-val">${a.toFixed(3)} cm</span></p>

<p>&nbsp;</p>
<p><span class="code-sec-u">// 2. 極限中性軸 x 與曲率 (Φu)</span></p>
<p>β₁ = ${fc <= 280 ? '0.85 (f\'c ≤ 280 kgf/cm²)' : `0.85 − 0.05×((${fc}−280)/70) = <span class="code-val">${beta1.toFixed(3)}</span>`}</p>
<p>β₁ = <span class="code-val">${beta1.toFixed(3)}</span></p>
<p>中性軸 x = a / β₁ = ${a.toFixed(3)} / ${beta1.toFixed(3)}</p>
<p>         x = <span class="code-val">${x_u.toFixed(3)} cm</span></p>
<p>εcu = 0.003 (ACI 規範混凝土極限壓縮應變)</p>
<p>Φu = εcu / x = 0.003 / ${x_u.toFixed(3)}</p>
<p>   Φu = <span class="code-val">${(phi_u*1000).toFixed(5)} × 10⁻³ rad/cm</span></p>

<div class="mu-box">
  <span>延展比 μ = Φu / Φy = ${(phi_u*1000).toFixed(4)} / ${(R.phi_y*1000).toFixed(4)}</span>
  <span class="mu-val">μ = ${mu.toFixed(2)}</span>
</div>
    `;
  }
  document.getElementById('code-content').innerHTML = html;
}

/* ─── Tab 切換 ─── */
function switchTab(tab) {
  activeTab = tab;
  document.getElementById('tab-yield').className = 'tab' + (tab === 'yield'    ? ' active-yield' : '');
  document.getElementById('tab-ult').className   = 'tab' + (tab === 'ultimate' ? ' active-ult'   : '');
  render();
}

/* ─── 初始化 ─── */
render();
</script>
</body>
</html>
